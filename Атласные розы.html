<html lang="ru"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<title>Атласные розы</title>
<style>
  body{margin:0;font-family:Arial;text-align:center;background:#ffe6eb;overflow-x:hidden;}
  .top{background:linear-gradient(90deg,#ff3b6f,#ff1744);color:#fff;padding:25px;font-size:28px;font-weight:700;}

  .card{background:#fff;width:300px;border-radius:20px;box-shadow:0 10px 25px rgba(0,0,0,0.18);padding:15px;transition:0.25s;}

  button{background:#25D366;border:none;color:#fff;padding:10px 18px;border-radius:10px;cursor:pointer;font-size:15px;}
  .bottom{margin-top:50px;background:linear-gradient(90deg,#ff3b6f,#ff1744);color:#fff;padding:20px;font-size:17px;}
  .petal{position:fixed;top:-30px;font-size:22px;pointer-events:none;animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(110vh) rotate(360deg);opacity:0;}}
  /* small helper for debug text */
  #debug{position:fixed;left:10px;bottom:10px;background:rgba(255,255,255,0.9);padding:6px 8px;border-radius:6px;font-size:12px;color:#333}
</style>

<body>

<div class="top">Атласные розы ручной работы 🌹</div>

<div class="text">
  Красивые искусственные розы из атласной ленты. <b>Цена от 5000 тг и выше</b>, зависит от количества роз.
</div>

<div class="container">
  <div class="card">
    <!-- локальный файл 1.jpg; если не найдётся — JS подставит запасную картинку -->
    <img id="imgA" src="./Атласные розы_files/Red_rose.jpg" alt="Букет из 15 роз">
    <h2>Букет из 15 роз</h2>
    <div class="price">12000 тг</div>
    <button onclick="window.location.href=&#39;https://wa.me/77053658014&#39;">Заказать в WhatsApp</button>
  </div>

  <div class="card">
    <img id="imgB" src="./Атласные розы_files/Rose_pink_1.jpg" alt="Букет из 7 роз">
    <h2>Букет из 7 роз</h2>
    <div class="price">5000 тг</div>
    <button onclick="window.location.href=&#39;https://wa.me/77053658014&#39;">Заказать в WhatsApp</button>
  </div>
</div>

<div class="bottom">Пишите для заказа 📩 &nbsp; WhatsApp: +7 705 365 8014</div>

<!-- мелкий блок для отладки (можешь скрыть потом) -->
<div id="debug">Замена: imgB -&gt; fallback</div>

<script>
/*
  1) Если локальная картинка не загрузилась (ошибка или пустая),
     скрипт автоматически подставит рабочую картинку из интернета.
  2) Кроме того, скрипт записывает в #debug, что произошло.
*/

const fallIntervalMs = 420;
const debug = id => { const el = document.getElementById('debug'); if(el) el.textContent = id; console.log(id); };

// запасные (надёжные) картинки роз в интернете:
const FALLBACK_A = 'https://upload.wikimedia.org/wikipedia/commons/3/35/Red_rose.jpg';
const FALLBACK_B = 'https://upload.wikimedia.org/wikipedia/commons/b/bf/Rose_pink_1.jpg';

// проверяем изображение: если failed — заменяем
function ensureImage(imgEl, fallbackUrl){
  function replace(){
    debug('Замена: ' + imgEl.id + ' -> fallback');
    imgEl.src = fallbackUrl;
  }
  // если при загрузке сработал onerror — заменяем
  imgEl.addEventListener('error', () => { replace(); });
  // через 300ms проверим naturalWidth (вдруг браузер закэшировал коряво)
  setTimeout(() => {
    if(!imgEl.complete || imgEl.naturalWidth === 0){
      replace();
    } else {
      debug(imgEl.id + ' загружено локально (' + imgEl.naturalWidth + 'x' + imgEl.naturalHeight + ')');
    }
  }, 300);
}

ensureImage(document.getElementById('imgA'), FALLBACK_A);
ensureImage(document.getElementById('imgB'), FALLBACK_B);

// создаём падающие розы (эмодзи) — декоративно
function createPetal(){
  const petal = document.createElement('div');
  petal.className = 'petal';
  petal.innerHTML = '🌹';
  petal.style.left = Math.random()*100 + 'vw';
  petal.style.fontSize = (14 + Math.random()*26) + 'px';
  petal.style.animationDuration = (4 + Math.random()*6) + 's';
  petal.style.opacity = 0.9;
  document.body.appendChild(petal);
  setTimeout(()=> petal.remove(), 12000);
}
setInterval(createPetal, fallIntervalMs);

// Доп. подсказки в консоль для быстрой диагностики
console.log('Если картинки не видны, проверьте: 1) index.html и 1.jpg/2.jpg в одной папке; 2) расширения файлов отображаются; 3) откройте файл через браузер (правый клик -> Открыть с помощью -> Chrome).');
</script>
